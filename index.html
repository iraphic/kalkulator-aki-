        // Komponen Tabel Rekomendasi Revenue
        function RevenueRecommendationTable({ results, inputs }) {
            // Helper function untuk mendapatkan multiplier kuantitas yang aman
            const getSafeQuantity = (quantity) => {
                return Number.isFinite(quantity) ? Math.max(quantity, 0) : 1;
            };

            // Menghitung rekomendasi revenue agar proyek menjadi layak
            const calculateRecommendedRevenue = () => {
                // Hitung total jumlah titik/SSL
                const totalPoints = inputs.services.reduce((sum, service) => sum + getSafeQuantity(service.quantity), 0);

                // Jika proyek sudah layak, tidak perlu rekomendasi tambahan
                if (results.npv > 0 && results.irr >= 15) {
                    const currentMonthlyTotal = inputs.services.reduce((sum, service) => sum + (service.monthlyRevenue * getSafeQuantity(service.quantity)), 0);
                    const currentOtcTotal = inputs.services.reduce((sum, service) => sum + (service.otcCost * getSafeQuantity(service.quantity)), 0);

                    return {
                        needsAdjustment: false,
                        recommendedMonthlyIncrease: 0,
                        recommendedOtcIncrease: 0,
                        recommendedMonthlyTotal: currentMonthlyTotal,
                        recommendedOtcTotal: currentOtcTotal,
                        currentMonthlyTotal: currentMonthlyTotal,
                        currentOtcTotal: currentOtcTotal,
                        totalPoints: totalPoints,
                        currentMonthlyPerPoint: totalPoints > 0 ? currentMonthlyTotal / totalPoints : 0,
                        currentOtcPerPoint: totalPoints > 0 ? currentOtcTotal / totalPoints : 0,
                        recommendedMonthlyPerPoint: totalPoints > 0 ? currentMonthlyTotal / totalPoints : 0,
                        recommendedOtcPerPoint: totalPoints > 0 ? currentOtcTotal / totalPoints : 0,
                        minMonthlyPerPointForIRR: totalPoints > 0 ? currentMonthlyTotal / totalPoints : 0
                    };
                }

                // Menghitung tambahan revenue dengan memanggil perhitungan aktual (NPV/IRR) menggunakan pencarian biner
                const currentMonthlyTotal = inputs.services.reduce((sum, service) => sum + (service.monthlyRevenue * getSafeQuantity(service.quantity)), 0);
                const currentOtcTotal = inputs.services.reduce((sum, service) => sum + (service.otcCost * getSafeQuantity(service.quantity)), 0);
                const currentMonthlyPerPoint = totalPoints > 0 ? currentMonthlyTotal / totalPoints : 0;

                const isViable = (res) => res.npv > 0 && res.irr >= 15;

                const simulateWithMonthlyDelta = (deltaPerPoint) => {
                    const testInputs = {
                        ...inputs,
                        services: inputs.services.map(s => ({
                            ...s,
                            monthlyRevenue: s.monthlyRevenue + deltaPerPoint
                        }))
                    };
                    return calculateFinancialAnalysis(testInputs);
                };

                const simulateWithOtcDelta = (deltaPerPoint) => {
                    const testInputs = {
                        ...inputs,
                        services: inputs.services.map(s => ({
                            ...s,
                            otcCost: s.otcCost + deltaPerPoint
                        }))
                    };
                    return calculateFinancialAnalysis(testInputs);
                };

                // Cari tambahan bulanan per SSL minimum agar layak (NPV > 0, IRR ≥ 15%)
                let loM = 0;
                let hiM = Math.max(currentMonthlyPerPoint * 10, 1000000, (inputs.investmentCost / Math.max(1, inputs.contractPeriod)) / Math.max(1, totalPoints) * 3);
                let resHiM = simulateWithMonthlyDelta(hiM);
                let guard = 0;
                while (!isViable(resHiM) && guard < 6) {
                    hiM *= 2;
                    resHiM = simulateWithMonthlyDelta(hiM);
                    guard++;
                }
                for (let i = 0; i < 24; i++) {
                    const mid = (loM + hiM) / 2;
                    const resMid = simulateWithMonthlyDelta(mid);
                    if (isViable(resMid)) {
                        hiM = mid;
                    } else {
                        loM = mid;
                    }
                }
                const monthlyDeltaPerPoint = hiM; // tambahan per SSL yang diperlukan
                const monthlyIncrease = monthlyDeltaPerPoint * totalPoints;

                // Cari tambahan OTC per SSL minimum agar layak
                let loO = 0;
                let hiO = Math.max((currentOtcTotal / Math.max(1, totalPoints)) * 5, (inputs.investmentCost / Math.max(1, totalPoints)), 500000);
                let resHiO = simulateWithOtcDelta(hiO);
                guard = 0;
                while (!isViable(resHiO) && guard < 6) {
                    hiO *= 2;
                    resHiO = simulateWithOtcDelta(hiO);
                    guard++;
                }
                for (let i = 0; i < 24; i++) {
                    const mid = (loO + hiO) / 2;
                    const resMid = simulateWithOtcDelta(mid);
                    if (isViable(resMid)) {
                        hiO = mid;
                    } else {
                        loO = mid;
                    }
                }
                const otcDeltaPerPoint = hiO;
                const otcIncrease = otcDeltaPerPoint * totalPoints;

                // Pilih strategi dengan persentase kenaikan lebih kecil
                const monthlyIncreasePercent = currentMonthlyTotal > 0 ? (monthlyIncrease / currentMonthlyTotal) : Infinity;
                const otcIncreasePercent = currentOtcTotal > 0 ? (otcIncrease / currentOtcTotal) : Infinity;

                const useMonthly = monthlyIncreasePercent <= otcIncreasePercent;

                if (useMonthly) {
                    return {
                        needsAdjustment: true,
                        recommendedMonthlyIncrease: monthlyIncrease,
                        recommendedOtcIncrease: 0,
                        recommendedMonthlyTotal: currentMonthlyTotal + monthlyIncrease,
                        recommendedOtcTotal: currentOtcTotal,
                        currentMonthlyTotal,
                        currentOtcTotal,
                        increasePercentage: monthlyIncreasePercent * 100,
                        totalPoints,
                        currentMonthlyPerPoint,
                        currentOtcPerPoint: totalPoints > 0 ? currentOtcTotal / totalPoints : 0,
                        recommendedMonthlyPerPoint: totalPoints > 0 ? (currentMonthlyTotal + monthlyIncrease) / totalPoints : 0,
                        recommendedOtcPerPoint: totalPoints > 0 ? currentOtcTotal / totalPoints : 0,
                        minMonthlyPerPointForIRR: totalPoints > 0 ? (currentMonthlyPerPoint + monthlyDeltaPerPoint) : 0
                    };
                } else {
                    return {
                        needsAdjustment: true,
                        recommendedMonthlyIncrease: 0,
                        recommendedOtcIncrease: otcIncrease,
                        recommendedMonthlyTotal: currentMonthlyTotal,
                        recommendedOtcTotal: currentOtcTotal + otcIncrease,
                        currentMonthlyTotal,
                        currentOtcTotal,
                        increasePercentage: otcIncreasePercent * 100,
                        totalPoints,
                        currentMonthlyPerPoint,
                        currentOtcPerPoint: totalPoints > 0 ? currentOtcTotal / totalPoints : 0,
                        recommendedMonthlyPerPoint: totalPoints > 0 ? currentMonthlyTotal / totalPoints : 0,
                        recommendedOtcPerPoint: totalPoints > 0 ? (currentOtcTotal + otcIncrease) / totalPoints : 0,
                        minMonthlyPerPointForIRR: totalPoints > 0 ? (currentMonthlyPerPoint + monthlyDeltaPerPoint) : 0
                    };
                }
            };

            const recommendation = calculateRecommendedRevenue();

            return (
                <div className="card">
                    <div className="card-header">
                        <h2>Rekomendasi Revenue untuk Kelayakan Proyek</h2>
                    </div>
                    <div className="card-content">
                        {!recommendation.needsAdjustment ? (
                            <div className="p-4 bg-green-50 border border-green-200 rounded-md mb-4">
                                <p className="text-green-800 font-medium">
                                    Proyek sudah layak dengan revenue saat ini. Tidak diperlukan penyesuaian revenue.
                                </p>
                            </div>
                        ) : (
                            <div className="p-4 bg-amber-50 border border-amber-200 rounded-md mb-4">
                                <p className="text-amber-800 font-medium">
                                    Proyek memerlukan penyesuaian revenue untuk mencapai kelayakan (NPV positif dan IRR ≥ 15%).
                                </p>
                            </div>
                        )}

                        <div className="overflow-x-auto">
                            <table className="table table-striped">
                                <thead>
                                    <tr className="bg-muted">
                                        <th className="px-4 py-3 text-left font-medium text-foreground">Parameter</th>
                                        <th className="px-4 py-3 text-center font-medium text-foreground">Nilai Saat Ini</th>
                                        <th className="px-4 py-3 text-center font-medium text-foreground">Rekomendasi</th>
                                        <th className="px-4 py-3 text-center font-medium text-foreground">Perubahan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td className="px-4 py-3 font-medium">Revenue Bulanan</td>
                                        <td className="px-4 py-3 text-center">
                                            {formatCurrency(recommendation.currentMonthlyTotal)}
                                        </td>
                                        <td className="px-4 py-3 text-center font-medium">
                                            {formatCurrency(recommendation.recommendedMonthlyTotal)}
                                        </td>
                                        <td className="px-4 py-3 text-center">
                                            {recommendation.recommendedMonthlyIncrease > 0 ? (
                                                <span className="text-amber-600">
                                                    +{formatCurrency(recommendation.recommendedMonthlyIncrease)}
                                                    ({Math.round(recommendation.increasePercentage)}%)
                                                </span>
                                            ) : "Tidak ada perubahan"}
                                        </td>
                                    </tr>
                                    <tr>
                                        <td className="px-4 py-3 font-medium">Revenue Bulanan per SSL</td>
                                        <td className="px-4 py-3 text-center">
                                            {formatCurrency(recommendation.currentMonthlyPerPoint)}
                                        </td>
                                        <td className="px-4 py-3 text-center font-medium">
                                            {formatCurrency(recommendation.recommendedMonthlyPerPoint)}
                                        </td>
                                        <td className="px-4 py-3 text-center">
                                            {recommendation.recommendedMonthlyIncrease > 0 ? (
                                                <span className="text-amber-600">
                                                    +{formatCurrency(recommendation.recommendedMonthlyPerPoint - recommendation.currentMonthlyPerPoint)}
                                                    ({Math.round(recommendation.increasePercentage)}%)
                                                </span>
                                            ) : "Tidak ada perubahan"}
                                        </td>
                                    </tr>
                                    <tr>
                                        <td className="px-4 py-3 font-medium">Revenue OTC</td>
                                        <td className="px-4 py-3 text-center">
                                            {formatCurrency(recommendation.currentOtcTotal)}
                                        </td>
                                        <td className="px-4 py-3 text-center font-medium">
                                            {formatCurrency(recommendation.recommendedOtcTotal)}
                                        </td>
                                        <td className="px-4 py-3 text-center">
                                            {recommendation.recommendedOtcIncrease > 0 ? (
                                                <span className="text-amber-600">
                                                    +{formatCurrency(recommendation.recommendedOtcIncrease)}
                                                    ({Math.round(recommendation.increasePercentage)}%)
                                                </span>
                                            ) : "Tidak ada perubahan"}
                                        </td>
                                    </tr>
                                    <tr>
                                        <td className="px-4 py-3 font-medium">Revenue OTC per SSL</td>
                                        <td className="px-4 py-3 text-center">
                                            {formatCurrency(recommendation.currentOtcPerPoint)}
                                        </td>
                                        <td className="px-4 py-3 text-center font-medium">
                                            {formatCurrency(recommendation.recommendedOtcPerPoint)}
                                        </td>
                                        <td className="px-4 py-3 text-center">
                                            {recommendation.recommendedOtcIncrease > 0 ? (
                                                <span className="text-amber-600">
                                                    +{formatCurrency(recommendation.recommendedOtcPerPoint - recommendation.currentOtcPerPoint)}
                                                    ({Math.round(recommendation.increasePercentage)}%)
                                                </span>
                                            ) : "Tidak ada perubahan"}
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div className="mt-4">
                            <h3 className="font-semibold mb-2">Catatan Rekomendasi:</h3>
                            <ul className="list-disc pl-5 space-y-1">
                                {recommendation.needsAdjustment ? (
                                    <>
                                        <li>Rekomendasi di atas adalah perkiraan minimum untuk mencapai NPV positif dan IRR ≥ 15%.</li>
                                        {recommendation.recommendedMonthlyIncrease > 0 ? (
                                            <li>Disarankan untuk meningkatkan revenue bulanan sebesar {formatCurrency(recommendation.recommendedMonthlyIncrease)} untuk mencapai kelayakan proyek.</li>
                                        ) : (
                                            <li>Disarankan untuk meningkatkan revenue OTC sebesar {formatCurrency(recommendation.recommendedOtcIncrease)} untuk mencapai kelayakan proyek.</li>
                                        )}
                                        <li>Pertimbangkan untuk menegosiasikan harga atau mencari efisiensi biaya investasi.</li>
                                        <li>Untuk mencapai IRR ≥ 15%, revenue bulanan per SSL minimal: <strong>{formatCurrency(recommendation.minMonthlyPerPointForIRR)}</strong></li>
                                    </>
                                ) : (
                                    <>
                                        <li>Proyek sudah layak dengan struktur revenue saat ini.</li>
                                        <li>NPV: {formatCurrency(results.npv)} (Positif)</li>
                                        <li>IRR: {formatPercentage(results.irr)} (≥ 15%)</li>
                                        <li>Revenue bulanan per SSL saat ini: <strong>{formatCurrency(recommendation.minMonthlyPerPointForIRR)}</strong> (sudah mencukupi untuk IRR ≥ 15%)</li>
                                    </>
                                )}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        }

        // Render aplikasi
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FinancialAnalysis />);
    </script>
</body>

</html>
